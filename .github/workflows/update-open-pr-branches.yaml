name: Update Open PR Branches

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  update-open-pr-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Update open PR branches with latest main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["REPOSITORY"]
          base_url = f"https://api.github.com/repos/{repository}"


          def request_json(method: str, url: str, body: dict | None = None) -> tuple[int, dict | list, dict]:
              data = None
              if body is not None:
                  data = json.dumps(body).encode("utf-8")

              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              if data is not None:
                  req.add_header("Content-Type", "application/json")

              try:
                  with urllib.request.urlopen(req) as response:
                      payload = response.read().decode("utf-8")
                      parsed = json.loads(payload) if payload else {}
                      return response.status, parsed, dict(response.headers)
              except urllib.error.HTTPError as err:
                  payload = err.read().decode("utf-8")
                  parsed = json.loads(payload) if payload else {}
                  return err.code, parsed, dict(err.headers)


          open_prs: list[dict] = []
          next_url = f"{base_url}/pulls?state=open&per_page=100"

          while next_url:
              status, payload, headers = request_json("GET", next_url)
              if status != 200:
                  raise RuntimeError(f"Failed to list open pull requests (status {status}): {payload}")

              if not isinstance(payload, list):
                  raise RuntimeError(f"Unexpected payload while listing pull requests: {payload}")

              open_prs.extend(payload)

              link_header = headers.get("Link", "")
              next_url = None
              for part in link_header.split(","):
                  if 'rel="next"' in part:
                      next_url = part.split(";")[0].strip()[1:-1]
                      break

          if not open_prs:
              print("No open pull requests found.")
              raise SystemExit(0)

          print(f"Found {len(open_prs)} open pull request(s).")

          updated_count = 0
          skipped_count = 0
          failed_count = 0

          for pr in open_prs:
              pr_number = pr["number"]
              pr_title = pr.get("title", "")
              expected_head_sha = pr.get("head", {}).get("sha")

              if not expected_head_sha:
                  print(f"Skipping PR #{pr_number}: missing head SHA")
                  skipped_count += 1
                  continue

              status, payload, _ = request_json(
                  "PUT",
                  f"{base_url}/pulls/{pr_number}/update-branch",
                  body={"expected_head_sha": expected_head_sha},
              )

              if status in {200, 202}:
                  print(f"Queued update for PR #{pr_number}: {pr_title}")
                  updated_count += 1
              elif status == 422:
                  print(f"Skipped PR #{pr_number}: already up to date or not updateable ({payload})")
                  skipped_count += 1
              else:
                  print(f"Failed to update PR #{pr_number} (status {status}): {payload}")
                  failed_count += 1

          print(
              f"Summary: updated={updated_count}, skipped={skipped_count}, failed={failed_count}"
          )
          PY
