# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "daily"
      time: "18:00"
      timezone: "Europe/Berlin"
    draft-pull-requests: false

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "18:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 1
    reviewers:
      - "JohannesKnecht"
    draft-pull-requests: false
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"

  - package-ecosystem: "npm"
    directory: "frontend/AnkiAICardCreationFrontend"
    schedule:
      interval: "daily"
      time: "18:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 1
    reviewers:
      - "JohannesKnecht"
    draft-pull-requests: false
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"

  - package-ecosystem: "uv"
    directory: "backend/AnkiAICardCreationToolboxBackend"
    schedule:
      interval: "daily"
      time: "18:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 1
    reviewers:
      - "JohannesKnecht"
    draft-pull-requests: false
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"

  - package-ecosystem: "docker"
    directories:
      - "backend/AnkiAICardCreationToolboxBackend"
      - "frontend/AnkiAICardCreationFrontend"
    schedule:
      interval: "daily"
      time: "18:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 1
    reviewers:
      - "JohannesKnecht"
    draft-pull-requests: false
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
